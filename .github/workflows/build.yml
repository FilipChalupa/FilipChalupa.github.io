name: Build Tailwind CSS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build CSS
        run: npm run build

      - name: Commit CSS artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/styles.css
          git diff --quiet && git diff --staged --quiet || git commit -m "Build: Generate Tailwind CSS"

      - name: Push changes
        run: git push
